name: Build Gemini Browser APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: List APK output
        run: find app/build/outputs/apk -name "*.apk" -ls

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias mykey -storepass password123 -keypass password123 \
            -dname "CN=Gemini, OU=Browser, O=Custom, L=BR, S=BR, C=BR"
          
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK encontrado: $APK_PATH"
          
          cp "$APK_PATH" gemini-browser.apk
          
          $JAVA_HOME/bin/jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release-key.jks -storepass password123 -keypass password123 \
            gemini-browser.apk mykey
          
          ls -lh gemini-browser.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gemini-browser
          path: gemini-browser.apk
          retention-days: 7
