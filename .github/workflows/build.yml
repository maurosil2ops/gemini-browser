name: Slim Via Browser APK

on:
  workflow_dispatch:

jobs:
  slim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          curl -sL https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o /tmp/apktool.jar
          printf '#!/bin/sh\njava -jar /tmp/apktool.jar "$@"\n' > /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Download Via Browser APK
        run: |
          curl -sL "https://res.viayoo.com/v1/via-release.apk" -o via-release.apk
          ls -lh via-release.apk

      - name: Decompile APK
        run: apktool d via-release.apk -o via-decompiled --no-src -f

      - name: Remove only safe bloat (assets only)
        run: |
          cd via-decompiled
          # Só remover assets que não afetam drawables/resources
          rm -rf assets/adblock 2>/dev/null || true
          rm -f assets/*.js 2>/dev/null || true
          du -sh .

      - name: Set Gemini as homepage
        run: |
          find via-decompiled -name "*.xml" | xargs grep -rl "about:home\|about:blank" 2>/dev/null | \
            xargs -I{} sed -i 's|about:home|https://gemini.google.com/app|g; s|about:blank|https://gemini.google.com/app|g' {} || true

      - name: Recompile APK
        run: |
          apktool b via-decompiled -o via-slim.apk --use-aapt2
          ls -lh via-slim.apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias mykey -storepass pass123 -keypass pass123 \
            -dname "CN=Via, O=Custom, C=BR"
          $JAVA_HOME/bin/jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore key.jks -storepass pass123 -keypass pass123 \
            via-slim.apk mykey
          ls -lh via-slim.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: via-slim
          path: via-slim.apk
          retention-days: 7
